<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>QR 掃描強化版</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  body { text-align: center; font-family: Arial; background: #f5f5f5; }
  #reader { width: 400px; margin: 20px auto; border: 3px solid #333; border-radius: 12px; overflow: hidden; }
  .btn { margin: 10px; padding: 12px 25px; font-size: 16px; border-radius: 10px; border: none; cursor: pointer; }
  .start { background: #4CAF50; color: white; }
  .stop { background: #f44336; color: white; }
  .switch { background: #2196F3; color: white; }
  #result { margin-top: 20px; font-size: 18px; color: #333; word-break: break-all; }
</style>
</head>
<body>

<h2>📷 QR 掃描系統（強化版）</h2>

<div id="reader"></div>

<div>
  <button class="btn start" onclick="startScanner()">開啟掃描</button>
  <button class="btn stop" onclick="stopScanner()">關閉掃描</button>
  <button class="btn switch" onclick="switchCamera()">切換鏡頭</button>
</div>

<div id="result">掃描結果：尚未掃描</div>

<script>
let scanner = null;
let isScanning = false;
let cameras = [];
let currentCameraIndex = 0;

function startScanner() {
  if (isScanning) return;
  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if (!devices || devices.length === 0) { alert("找不到鏡頭"); return; }
    cameras = devices;
    currentCameraIndex = 0;
    startCameraByIndex(currentCameraIndex);
  }).catch(err => alert("取得鏡頭失敗：" + err));
}

function startCameraByIndex(index) {
  const cameraId = cameras[index].id;
  scanner.start(
    cameraId,
    { fps: 30, qrbox: { width: 350, height: 350 } }, // 大框 + 高 FPS
    (decodedText) => {
      document.getElementById("result").innerText = "✅ 掃描成功：" + decodedText;
      if (navigator.vibrate) navigator.vibrate(200);
      playBeep();
    },
    (errorMessage) => {}
  ).then(() => isScanning = true).catch(err => alert("啟動鏡頭失敗：" + err));
}

function stopScanner() {
  if (scanner && isScanning) {
    scanner.stop().then(() => {
      isScanning = false;
      document.getElementById("reader").innerHTML = "";
    });
  }
}

function switchCamera() {
  if (!cameras || cameras.length < 2) return;
  if (!scanner) return;
  currentCameraIndex = (currentCameraIndex + 1) % cameras.length;
  scanner.stop().then(() => {
    isScanning = false;
    startCameraByIndex(currentCameraIndex);
  });
}

function playBeep() {
  const audio = new Audio("https://www.soundjay.com/buttons/beep-01a.mp3");
  audio.play();
}
</script>
</body>
</html>
