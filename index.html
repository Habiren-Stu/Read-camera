<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>相機測試</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f5f5f5;
    }

    #video {
      width: 80%;
      max-width: 500px;
      margin-top: 30px;
      border-radius: 12px;
      background: black;
    }

    .btn {
      margin: 20px 10px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .start {
      background-color: #4CAF50;
      color: white;
    }

    .stop {
      background-color: #f44336;
      color: white;
    }
  </style>
</head>

<body>

<h2>📷 鏡頭預覽</h2>

<video id="video" autoplay playsinline></video>

<div>
  <button class="btn start" onclick="startCamera()">開啟鏡頭</button>
  <button class="btn stop" onclick="stopCamera()">關閉鏡頭</button>
</div>

<script>
let stream = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById("video").srcObject = stream;
  } catch (err) {
    alert("無法開啟鏡頭：" + err.message);
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    document.getElementById("video").srcObject = null;
  }
}
</script>

</body>
</html>
