<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>QR Code 掃描系統（切換鏡頭版）</title>
  
  <!-- QR Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f5f5f5;
    }

    #reader {
      width: 320px;
      margin: 20px auto;
      border: 3px solid #333;
      border-radius: 12px;
      overflow: hidden;
    }

    .btn {
      margin: 10px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .start { background: #4CAF50; color: white; }
    .stop { background: #f44336; color: white; }
    .switch { background: #2196F3; color: white; }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: #333;
      word-break: break-all;
    }
  </style>
</head>

<body>

<h2>📷 QR Code 掃描系統</h2>

<div id="reader"></div>

<div>
  <button class="btn start" onclick="startScanner()">開啟掃描</button>
  <button class="btn stop" onclick="stopScanner()">關閉掃描</button>
  <button class="btn switch" onclick="switchCamera()">切換鏡頭</button>
</div>

<div id="result">掃描結果：尚未掃描</div>

<script>
let scanner = null;
let isScanning = false;
let cameras = [];
let currentCameraIndex = 0;

// 啟動掃描
function startScanner() {
  if (isScanning) return;

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if (!devices || devices.length === 0) {
      alert("找不到鏡頭");
      return;
    }

    cameras = devices; // 儲存所有鏡頭
    currentCameraIndex = 0; // 預設第一個

    startCameraByIndex(currentCameraIndex);
  }).catch(err => {
    alert("取得鏡頭失敗：" + err);
  });
}

// 根據索引啟動鏡頭
function startCameraByIndex(index) {
  if (!cameras || cameras.length === 0) return;

  const cameraId = cameras[index].id;

  scanner.start(
    cameraId,
    {
      fps: 20,
      qrbox: { width: 250, height: 250 }
    },
    (decodedText) => {
      document.getElementById("result").innerText = "✅ 掃描成功：" + decodedText;

      // 手機震動
      if (navigator.vibrate) navigator.vibrate(200);
      // 提示音
      playBeep();
    },
    (errorMessage) => {
      // 忽略掃描錯誤
    }
  ).then(() => {
    isScanning = true;
  }).catch(err => {
    alert("啟動鏡頭失敗：" + err);
  });
}

// 切換鏡頭
function switchCamera() {
  if (!cameras || cameras.length < 2) return; // 沒有可切換鏡頭
  if (!scanner) return;

  currentCameraIndex = (currentCameraIndex + 1) % cameras.length;

  scanner.stop().then(() => {
    isScanning = false;
    startCameraByIndex(currentCameraIndex);
  });
}

// 停止掃描
function stopScanner() {
  if (scanner && isScanning) {
    scanner.stop().then(() => {
      isScanning = false;
      document.getElementById("reader").innerHTML = "";
    });
  }
}

// 🔊 提示音
function playBeep() {
  const audio = new Audio("https://www.soundjay.com/buttons/beep-01a.mp3");
  audio.play();
}
</script>

</body>
</html>
