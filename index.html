<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>QR掃描器</title>

  <!-- QR Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #f5f5f5;
    }

    #reader {
      width: 300px;
      margin: 20px auto;
    }

    .btn {
      margin: 10px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .start { background: #4CAF50; color: white; }
    .stop { background: #f44336; color: white; }
  </style>
</head>

<body>

<h2>📷 QR Code 掃描</h2>

<div id="reader"></div>

<div>
  <button class="btn start" onclick="startScanner()">開啟掃描</button>
  <button class="btn stop" onclick="stopScanner()">關閉掃描</button>
</div>

<h3 id="result">掃描結果：</h3>

<script>
let scanner;

function startScanner() {
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" }, // 後鏡頭
    {
      fps: 10,
      qrbox: 250
    },
    (decodedText) => {
      document.getElementById("result").innerText = "掃描結果：" + decodedText;

      // 掃到就停止（可拿掉）
      stopScanner();
    },
    (errorMessage) => {
      // 可忽略掃描錯誤
    }
  ).catch(err => {
    alert("啟動失敗：" + err);
  });
}

function stopScanner() {
  if (scanner) {
    scanner.stop().then(() => {
      console.log("已停止");
    });
  }
}
</script>

</body>
</html>
